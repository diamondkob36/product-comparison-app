<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard สำหรับร้านอาหาร</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .dashboard-container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            color: #2d3748;
            font-size: 2.5rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .header p {
            color: #718096;
            font-size: 1.1rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            border-radius: 15px 15px 0 0;
        }

        .stat-card.menu::before {
            background: linear-gradient(90deg, #ff6b6b, #ee5a24);
        }

        .stat-card.users::before {
            background: linear-gradient(90deg, #4ecdc4, #44a08d);
        }

        .stat-card.ingredients::before {
            background: linear-gradient(90deg, #45b7d1, #96ceb4);
        }

        .stat-icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 24px;
        }

        .menu .stat-icon {
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            color: white;
        }

        .users .stat-icon {
            background: linear-gradient(135deg, #4ecdc4, #44a08d);
            color: white;
        }

        .ingredients .stat-icon {
            background: linear-gradient(135deg, #45b7d1, #96ceb4);
            color: white;
        }

        .stat-title {
            font-size: 1.2rem;
            color: #4a5568;
            margin-bottom: 15px;
            font-weight: 500;
        }

        .stat-number {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .menu .stat-number {
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .users .stat-number {
            background: linear-gradient(135deg, #4ecdc4, #44a08d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .ingredients .stat-number {
            background: linear-gradient(135deg, #45b7d1, #96ceb4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-subtitle {
            color: #718096;
            font-size: 0.9rem;
        }

        .quick-actions {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .actions-title {
            font-size: 1.5rem;
            color: #2d3748;
            margin-bottom: 25px;
            font-weight: 600;
        }

        .actions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .action-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 15px 20px;
            font-family: 'Kanit', sans-serif;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .progress-section {
            margin-top: 30px;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .progress-title {
            font-size: 1.5rem;
            color: #2d3748;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .progress-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .progress-bar {
            flex: 1;
            height: 8px;
            background: #e2e8f0;
            border-radius: 4px;
            margin: 0 15px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.8s ease;
        }

        .menu-progress { background: linear-gradient(90deg, #ff6b6b, #ee5a24); }
        .users-progress { background: linear-gradient(90deg, #4ecdc4, #44a08d); }
        .ingredients-progress { background: linear-gradient(90deg, #45b7d1, #96ceb4); }

        @media (max-width: 768px) {
            .dashboard-container {
                padding: 20px;
                margin: 10px;
            }

            .header h1 {
                font-size: 2rem;
            }

            .stat-number {
                font-size: 2.5rem;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }
        }

        .floating-elements {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .floating-circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            animation: float 6s ease-in-out infinite;
        }

        .floating-circle:nth-child(1) {
            width: 100px;
            height: 100px;
            top: 10%;
            left: 10%;
            animation-delay: 0s;
        }

        .floating-circle:nth-child(2) {
            width: 150px;
            height: 150px;
            top: 60%;
            right: 10%;
            animation-delay: 2s;
        }

        .floating-circle:nth-child(3) {
            width: 80px;
            height: 80px;
            bottom: 10%;
            left: 20%;
            animation-delay: 4s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
        }
    </style>
</head>
<body>
    <div class="floating-elements">
        <div class="floating-circle"></div>
        <div class="floating-circle"></div>
        <div class="floating-circle"></div>
    </div>

    <div class="dashboard-container">
        <div class="header">
            <h1>แดชบอร์ดร้านอาหาร</h1>
            <p>ภาพรวมข้อมูลสำคัญของร้าน</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card menu">
                <div class="stat-icon">🍽️</div>
                <div class="stat-title">เมนูจัดหมด</div>
                <div class="stat-number" id="menuCount">0</div>
                <div class="stat-subtitle">เมนูทั้งหมดในระบบ</div>
            </div>

            <div class="stat-card users">
                <div class="stat-icon">👥</div>
                <div class="stat-title">ผู้ใช้งาน</div>
                <div class="stat-number" id="userCount">0</div>
                <div class="stat-subtitle">ผู้ใช้งานที่ลงทะเบียน</div>
            </div>

            <div class="stat-card ingredients">
                <div class="stat-icon">🥬</div>
                <div class="stat-title">จำนวนวัตถุดิบ</div>
                <div class="stat-number" id="ingredientCount">0</div>
                <div class="stat-subtitle">วัตถุดิบทั้งหมดในสต็อก</div>
            </div>
        </div>

        <div class="quick-actions">
            <div class="actions-title">การดำเนินการด่วน</div>
            <div class="actions-grid">
                <button class="action-btn" onclick="addMenu()">เพิ่มเมนูใหม่</button>
                <button class="action-btn" onclick="manageUsers()">จัดการผู้ใช้งาน</button>
                <button class="action-btn" onclick="checkStock()">ตรวจสอบสต็อก</button>
                <button class="action-btn" onclick="viewReports()">ดูรายงาน</button>
            </div>
        </div>

        <div class="progress-section">
            <div class="progress-title">สถานะความครบถ้วน</div>
            
            <div class="progress-item">
                <span>เมนู</span>
                <div class="progress-bar">
                    <div class="progress-fill menu-progress" style="width: 85%"></div>
                </div>
                <span>85%</span>
            </div>

            <div class="progress-item">
                <span>ผู้ใช้งาน</span>
                <div class="progress-bar">
                    <div class="progress-fill users-progress" style="width: 30%"></div>
                </div>
                <span>30%</span>
            </div>

            <div class="progress-item">
                <span>วัตถุดิบ</span>
                <div class="progress-bar">
                    <div class="progress-fill ingredients-progress" style="width: 95%"></div>
                </div>
                <span>95%</span>
            </div>
        </div>
    </div>

    <script>
        // Animation for counting numbers
        function animateCount(elementId, targetValue, duration = 2000) {
            const element = document.getElementById(elementId);
            const startValue = 0;
            const increment = targetValue / (duration / 16);
            let currentValue = startValue;

            const timer = setInterval(() => {
                currentValue += increment;
                if (currentValue >= targetValue) {
                    element.textContent = targetValue;
                    clearInterval(timer);
                } else {
                    element.textContent = Math.floor(currentValue);
                }
            }, 16);
        }

        // Start animations when page loads
        window.addEventListener('load', () => {
            setTimeout(() => {
                animateCount('menuCount', 101);
                animateCount('userCount', 3);
                animateCount('ingredientCount', 475);
            }, 500);
        });

        // Button functions
        function addMenu() {
            alert('เปิดหน้าเพิ่มเมนูใหม่');
        }

        function manageUsers() {
            alert('เปิดหน้าจัดการผู้ใช้งาน');
        }

        function checkStock() {
            alert('เปิดหน้าตรวจสอบสต็อก');
        }

        function viewReports() {
            alert('เปิดหน้ารายงาน');
        }
    </script>
</body>
</html>
