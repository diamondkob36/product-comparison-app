<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>แก้ไขเมนู - MealMatch AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin-add-menu.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin-body.css') }}">
</head>
<body>
    {% include 'admin-menubar.html' %}
    <div class="main-content">
        <div class="add-menu-container">
            <h1 class="add-menu-title">แก้ไขเมนู</h1>
            <form method="POST" enctype="multipart/form-data">
                <label>ชื่อเมนู</label>
                <input type="text" name="name" value="{{ menu.name }}" required>

                <label>URL รูปภาพ</label>
                <input type="text" name="image_url" value="{{ menu.image_url or '' }}">

                <label>อัปโหลดรูปภาพใหม่</label>
                <input type="file" name="image_file" accept="image/*">

                <label>วัตถุดิบหลัก (JSON)</label>
                <textarea name="ingredients" rows="3">{{ menu.ingredients }}</textarea>

                <label>วัตถุดิบรอง (JSON)</label>
                <textarea name="secondary_ingredients" rows="3">{{ menu.secondary_ingredients }}</textarea>

                <label>วิธีทำ (JSON)</label>
                <textarea name="instructions" rows="3">{{ menu.instructions }}</textarea>

                <label>จำนวนเสิร์ฟ</label>
                <input type="number" name="servings" value="{{ menu.servings }}" min="1">

                <label>หมวดหมู่เมนู</label>
                <select name="category_id" required>
                    {% for c in categories %}
                        <option value="{{ c.id }}" {% if c.id == menu.category_id %}selected{% endif %}>{{ c.name }}</option>
                    {% endfor %}
                </select>

                <label>แหล่งที่มา (JSON)</label>
                <textarea name="source" rows="2">{{ menu.source }}</textarea>

                <label>รูปแบบเมนู</label>
                <select name="menu_type">
                    <option value='["general"]' {% if menu.menu_type == '["general"]' %}selected{% endif %}>เมนูทั่วไป</option>
                    <option value='["system"]' {% if menu.menu_type == '["system"]' %}selected{% endif %}>เมนูระบบ</option>
                </select>

                <div class="button-group">
                    <a href="{{ url_for('admin.all_menus') }}" class="btn-back">⬅ กลับ</a>
                    <button type="reset" class="btn-reset">รีเซ็ต</button>
                </div>

                <button type="submit" class="btn-save">บันทึกการแก้ไข</button>
            </form>
        </div>
    </div>
</body>
</html>
