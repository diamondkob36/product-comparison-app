<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}left-box{% endblock %}</title>

    <link rel="stylesheet" href="/static/css/left-box.css" type="text/css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script src="/static/js/left-box.js"></script>
</head>
<body>
    <div class="left-box">
        <div class="icon-button scroll-to-top" data-tooltip="เลื่อนกลับขึ้นด้านบน" data-icon="⬆️">
            <i class="fas fa-home"></i> <!-- เริ่มต้นเป็นไอคอนรูปบ้าน -->
        </div>
    </div>
    <div id="tooltip" class="tooltip"></div>
    {% block content %}{% endblock %}
</body>
</html>
